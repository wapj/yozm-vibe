{% extends "base.html" %}
{% block title %}{{ heading }} — RSS Wiki{% endblock %}
{% block content %}
<h2>{{ heading }}</h2>
{% if items %}
{% for item in items %}
<div class="card">
    <a href="{{ item.href }}">{{ item.title }}</a>
    {% if item.subtitle %}<small>{{ item.subtitle }}</small>{% endif %}
</div>
{% endfor %}
{% else %}
<p>아직 항목이 없습니다.</p>
{% endif %}
{% endblock %}
