{% extends "base.html" %}
{% block title %}피드 추가 — RSS Wiki{% endblock %}
{% block content %}
<h2>피드 추가</h2>
{% include "_flash.html" %}
<form method="post" action="/feeds">
    <p>
        <label>피드 URL
            <input type="url" name="url" required>
        </label>
    </p>
    <p>
        <label>이름(선택)
            <input type="text" name="name">
        </label>
    </p>
    <p>
        <button type="submit" class="btn btn-primary">추가</button>
        <a href="/feeds" class="btn">취소</a>
    </p>
</form>
{% endblock %}
