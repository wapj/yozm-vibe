<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}rss-wiki{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/theme.js"></script>
</head>
<body>
    <header class="site-header">
        <p class="site-header__title"><a href="/">rss-wiki</a></p>
        <nav class="site-header__nav" aria-label="주요 화면">
            <a href="/fetch">수집 실행</a>
            <a href="/feeds-admin">피드 관리</a>
        </nav>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="라이트/다크 테마 전환">
            테마 전환
        </button>
    </header>
    <main class="page">
        {% block content %}
        <h1>rss-wiki</h1>
        {% endblock %}
    </main>
</body>
</html>
