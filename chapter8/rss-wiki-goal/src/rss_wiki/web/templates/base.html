<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}RSS Wiki{% endblock %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-sub: #555;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --unread: #dc2626;
  --tag-bg: #eff6ff;
  --tag-text: #1d4ed8;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

/* ── 네비게이션 ──────────────────────────────── */
.navbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.navbar-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 1.5rem;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 0;
}
.navbar-brand {
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent);
  text-decoration: none;
  margin-right: 2rem;
  letter-spacing: -.3px;
}
.navbar-links {
  display: flex;
  gap: 0.25rem;
  flex: 1;
}
.navbar-links a {
  color: var(--text-sub);
  text-decoration: none;
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: background .15s, color .15s;
}
.navbar-links a:hover {
  background: var(--bg);
  color: var(--text);
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 1rem;
  border-radius: 6px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: background .15s, box-shadow .15s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm {
  padding: 0.25rem 0.6rem;
  font-size: 0.8rem;
  font-weight: 500;
}
.btn-ghost {
  background: transparent;
  color: var(--text-sub);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg); }
.btn-danger {
  background: transparent;
  color: #b91c1c;
  border: 1px solid #fca5a5;
}
.btn-danger:hover { background: #fef2f2; }

/* ── 본문 컨테이너 ────────────────────────────── */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* ── 카드 ─────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 1.5rem;
  margin-bottom: 1.25rem;
}

/* ── 페이지 제목 ──────────────────────────────── */
h1.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -.4px;
  margin-bottom: 1.25rem;
}
h2.section-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: var(--text-sub);
}

/* ── 미읽음 배지 ──────────────────────────────── */
.badge-unread {
  display: inline-block;
  background: var(--unread);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.1rem 0.45rem;
  border-radius: 99px;
  vertical-align: middle;
  margin-left: 0.4rem;
  letter-spacing: .3px;
}

/* ── 카테고리 그리드 ──────────────────────────── */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
}
.category-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.25rem;
  text-decoration: none;
  color: var(--text);
  display: block;
  transition: border-color .15s, box-shadow .15s;
  box-shadow: var(--shadow);
}
.category-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(37,99,235,.12);
}
.category-card.has-unread { border-left: 3px solid var(--unread); }
.category-card-name { font-weight: 600; font-size: 1rem; }

/* ── 마크다운 렌더링 영역 ─────────────────────── */
.wiki-content {
  line-height: 1.8;
  color: var(--text);
}
.wiki-content h1 { font-size: 1.5rem; font-weight: 700; margin: 1.4rem 0 0.6rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
.wiki-content h2 { font-size: 1.2rem; font-weight: 600; margin: 1.2rem 0 0.5rem; color: #334155; }
.wiki-content h3 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.4rem; }
.wiki-content p  { margin-bottom: 0.85rem; }
.wiki-content ul, .wiki-content ol { padding-left: 1.5rem; margin-bottom: 0.85rem; }
.wiki-content li { margin-bottom: 0.3rem; }
.wiki-content a  { color: var(--accent); text-decoration: none; }
.wiki-content a:hover { text-decoration: underline; }
.wiki-content strong { font-weight: 600; }
.wiki-content code { background: #f1f5f9; padding: .1em .35em; border-radius: 4px; font-size: .9em; font-family: monospace; }
.wiki-content pre { background: #f1f5f9; padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 0.85rem; }
.wiki-content pre code { background: none; padding: 0; }
.wiki-content table { border-collapse: collapse; width: 100%; margin-bottom: 0.85rem; }
.wiki-content th, .wiki-content td { border: 1px solid var(--border); padding: .4rem .7rem; }
.wiki-content th { background: var(--bg); font-weight: 600; }
.wiki-content blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--text-sub); margin-bottom: .85rem; }

/* ── 기사 목록 ────────────────────────────────── */
.article-list { list-style: none; }
.article-item {
  padding: 0.85rem 0;
  border-bottom: 1px solid var(--border);
}
.article-item:last-child { border-bottom: none; }
.article-title a { color: var(--text); font-weight: 500; text-decoration: none; }
.article-title a:hover { color: var(--accent); }
.article-meta { font-size: 0.8rem; color: var(--text-sub); margin-top: 0.2rem; }
.article-summary { font-size: 0.875rem; color: var(--text-sub); margin-top: 0.3rem; }

/* ── 폼 요소 ──────────────────────────────────── */
input[type=text], input[type=number], input[type=url] {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.4rem 0.7rem;
  font-size: 0.9rem;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
input[type=text]:focus, input[type=number]:focus, input[type=url]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.input-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-bottom: 1.25rem;
}
.input-row input { flex: 1; }

/* ── 테이블 ───────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
.data-table th {
  background: var(--bg);
  color: var(--text-sub);
  font-weight: 600;
  text-align: left;
  padding: 0.6rem 0.8rem;
  border-bottom: 2px solid var(--border);
}
.data-table td {
  padding: 0.6rem 0.8rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table .actions { display: flex; gap: 0.4rem; align-items: center; }

/* ── 태그 ─────────────────────────────────────── */
.tag {
  display: inline-block;
  background: var(--tag-bg);
  color: var(--tag-text);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
}
.tag-red { background: #fef2f2; color: #b91c1c; }
.tag-green { background: #f0fdf4; color: #15803d; }

/* ── 빈 상태 ──────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-sub);
}
.empty-state p { margin-bottom: 0.5rem; }

/* ── 검색 ─────────────────────────────────────── */
.search-results { margin-top: 1.25rem; }
.search-item {
  padding: 0.9rem 0;
  border-bottom: 1px solid var(--border);
}
.search-item:last-child { border-bottom: none; }

form { display: inline; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="/">📰 RSS Wiki</a>
    <div class="navbar-links">
      <a href="/">홈</a>
      <a href="/feeds">피드 관리</a>
      <a href="/categories/manage">카테고리 관리</a>
      <a href="/search">검색</a>
      <a href="/logs">로그</a>
    </div>
    <form method="post" action="/api/fetch">
      <button class="btn btn-primary" type="submit">▶ 지금 수집</button>
    </form>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
